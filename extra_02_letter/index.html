<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Envelope Letter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

    <div class="envelope">

        <!-- Stamp Right-->
        <div class="stamp">
        <img src="stampright.jpg" class="stamp">

        </div>

        <!-- Stamp Left -->
     <div class="poststamp">
     <img src="stampleft.jpg" class="poststamp">

</div>

        <!-- Address -->
        <div class="address">
            <h1 class="name">Mr. Smith Grey</h1>
            <p><class="center">81 Lorem street</p>
            <p><class="center">Ipsum</p>
            <p><class="center">0123-4567</p>
            <p><class="center">Dolor</p>
        </div>

    </div>

</div>

</body>
</html>
