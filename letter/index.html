<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Envelope Letter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

    <div class="envelope">

        <!-- Stamp -->
        <div class="stamp">
            <div class="stamp-inner"></div>
        </div>

        <!-- Postmark -->
        <div class="postmark">POST</div>

        <!-- Address -->
        <div class="address">
            <p>Mr. Smith Grey</p>
            <p>81 Lorem Street</p>
            <p>Ipsum City</p>
            <p>0123-4567</p>
            <p>Dolor</p>
        </div>

    </div>

</div>

</body>
</html>
